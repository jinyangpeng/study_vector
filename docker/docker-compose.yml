# ============================================================================
# study_vector — 基础编排（定义所有服务）
#
# Milvus 部署模式（由 .env 的 COMPOSE_PROFILES 控制）：
#   COMPOSE_PROFILES=milvus   内置模式：启动 etcd+minio+milvus（开箱即用，默认）
#   COMPOSE_PROFILES=         外部模式：仅启动 api+frontend，连接你已部署的 Milvus
#                              （此时把 MILVUS_HOST 改为外部 Milvus 地址）
#
# 环境差异通过 override 文件叠加：
#   - docker-compose.dev.yml   开发：仅依赖服务（Milvus），API/前端在宿主本地跑
#   - docker-compose.prod.yml  生产：资源限制 + 日志轮转 + always 重启
#
# 用法：
#   cp .env.example .env  &&  按需修改
#   docker compose up -d                                          # 按 .env 的 COMPOSE_PROFILES
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml  up -d   # 仅依赖
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d   # 生产
# ============================================================================

name: study_vector

services:
  # ============== Milvus 依赖：etcd ==============
  # profiles: milvus 激活时才启动（外部 Milvus 模式下不启动，省资源）
  etcd:
    profiles: ["milvus"]
    container_name: ${COMPOSE_PROJECT_NAME:-study_vector}_etcd
    image: quay.io/coreos/etcd:v3.5.16
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - ./volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    restart: unless-stopped
    networks: [study_vector_net]

  # ============== Milvus 依赖：minio（对象存储）==============
  minio:
    profiles: ["milvus"]
    container_name: ${COMPOSE_PROJECT_NAME:-study_vector}_minio
    image: minio/minio:RELEASE.2024-09-13T20-26-02Z
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - ./volumes/minio:/minio_data
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    restart: unless-stopped
    networks: [study_vector_net]

  # ============== Milvus Standalone ==============
  milvus:
    profiles: ["milvus"]
    container_name: ${COMPOSE_PROJECT_NAME:-study_vector}_milvus
    image: milvusdb/milvus:v2.4.10
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      - etcd
      - minio
    ports:
      - "${MILVUS_HOST_PORT:-19530}:19530"
      - "${MILVUS_METRICS_PORT:-9091}:9091"
    volumes:
      - ./volumes/milvus:/var/lib/milvus
    restart: unless-stopped
    networks: [study_vector_net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============== Python API ==============
  api:
    container_name: ${COMPOSE_PROJECT_NAME:-study_vector}_api
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.11-slim}
        UV_VERSION: ${UV_VERSION:-0.5.4}
    image: study_vector/api:${TAG:-latest}
    environment:
      APP_ENV: ${APP_ENV:-prod}
      MILVUS_HOST: ${MILVUS_HOST:-milvus}      # 容器内通信：service 名
      MILVUS_PORT: "19530"                       # 容器内固定端口
      MILVUS_USER: ${MILVUS_USER:-root}
      MILVUS_PASSWORD: ${MILVUS_PASSWORD:-Milvus}
      MILVUS_DB_NAME: ${MILVUS_DB_NAME:-default}
      MILVUS_SECURE: ${MILVUS_SECURE:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-true}
    # 注意：不写 depends_on milvus —— 外部 Milvus 模式下 milvus service 不存在。
    # 内置模式下 api 靠 restart: unless-stopped 自动重试连接（milvus 首次启动较慢）。
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped
    networks: [study_vector_net]

  # ============== 前端（nginx 静态 + API 反代）==============
  frontend:
    container_name: ${COMPOSE_PROJECT_NAME:-study_vector}_frontend
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-20-alpine}
        NGINX_VERSION: ${NGINX_VERSION:-1.27-alpine}
    image: study_vector/frontend:${TAG:-latest}
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    restart: unless-stopped
    networks: [study_vector_net]

networks:
  study_vector_net:
    driver: bridge
